# ══════════════════════════════════════════════════════════════
#  codemagic.yaml — автосборка Thermometer BLE
#
#  Два воркфлоу:
#    android-release  →  подписанный APK + AAB
#    ios-release      →  подписанный IPA
#
#  Триггер: push в ветку main
#  Артефакты: скачиваются со страницы сборки в Codemagic
#
#  Необходимые секреты (Settings → Environment variables):
#    Android:
#      CM_KEYSTORE          — PKCS12 (.p12) keystore base64 (см. инструкцию ниже)
#      CM_KEYSTORE_PASSWORD — пароль к keystore
#      CM_KEY_ALIAS         — alias ключа
#      CM_KEY_PASSWORD      — пароль к ключу
#    iOS:
#      настраивается через Code Signing Identities в UI Codemagic
#      (загрузить .p12 сертификат и .mobileprovision)
# ══════════════════════════════════════════════════════════════

workflows:

  # ────────────────────────────────────────────────────────────
  #  Android: подписанный APK + AAB
  # ────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60

    environment:
      flutter: 3.41.2
      java: 17
      # Переменные для подписания (задать в Codemagic UI → Environment variables)
      vars:
        PACKAGE_NAME: ru.matveyb9.diy.thermometer

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Восстанавливаем keystore из base64-секрета
      - name: Создать key.properties
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/thermometer/android/app/keystore.p12
          cat >> $CM_BUILD_DIR/thermometer/android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=keystore.p12
          EOF

      # 2. Получаем зависимости
      - name: Flutter pub get
        script: |
          cd thermometer
          flutter pub get

      # 3. Анализ кода
      - name: Flutter analyze
        script: |
          cd thermometer
          flutter analyze --no-fatal-infos

      # 4. Сборка APK (для прямой установки)
      - name: Build APK
        script: |
          cd thermometer
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

      # 5. Сборка AAB (для Google Play)
      - name: Build AAB
        script: |
          cd thermometer
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      # APK — прямая установка на устройство
      - thermometer/build/app/outputs/flutter-apk/app-release.apk
      # AAB — для загрузки в Google Play
      - thermometer/build/app/outputs/bundle/release/app-release.aab
      # Логи сборки
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com   # ← замени на свой email
        notify:
          success: true
          failure: true


  # ────────────────────────────────────────────────────────────
  #  iOS: подписанный IPA
  # ────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60

    environment:
      flutter: 3.41.2
      java: 17
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc    # ad_hoc = установка на конкретные устройства
                                      # app_store = для App Store Connect
        bundle_identifier: ru.matveyb9.diy.thermometer

      vars:
        BUNDLE_ID: ru.matveyb9.diy.thermometer

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Получаем зависимости Flutter
      - name: Flutter pub get
        script: |
          cd thermometer
          flutter pub get

      # 2. Устанавливаем CocoaPods-зависимости
      - name: Pod install
        script: |
          cd thermometer/ios
          pod install

      # 3. Анализ кода
      - name: Flutter analyze
        script: |
          cd thermometer
          flutter analyze --no-fatal-infos

      # 4. Сборка IPA
      - name: Build IPA
        script: |
          cd thermometer
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      # IPA — установка через AltStore / TestFlight / Codemagic
      - thermometer/build/ios/ipa/*.ipa
      # Логи Xcode (полезны при ошибках)
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your@email.com   # ← замени на свой email
        notify:
          success: true
          failure: true
