# ══════════════════════════════════════════════════════════════
#  codemagic.yaml — ТЕСТОВАЯ сборка Thermometer BLE
#
#  Два воркфлоу:
#    android-test  →  APK подписан debug-ключом (без секретов)
#    ios-test      →  неподписанный IPA (без Apple Developer аккаунта)
#
#  Триггер: push в ветку develop
#            (main оставлен для релизной сборки)
#
#  Секреты: НЕ НУЖНЫ
#
#  Ограничения:
#    Android APK — устанавливается на устройство, в Google Play нельзя
#    iOS IPA     — устанавливается через AltStore или Sideloadly
# ══════════════════════════════════════════════════════════════

workflows:

  # ────────────────────────────────────────────────────────────
  #  Android: APK с debug-ключом
  #  Секреты не нужны — Gradle использует встроенный debug keystore
  # ────────────────────────────────────────────────────────────
  android-test:
    name: Android Test Build
    max_build_duration: 30

    environment:
      flutter: 3.41.2
      java: 17
      vars:
        PACKAGE_NAME: ru.matveyb9.diy.thermometer

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      # 1. Зависимости
      - name: Flutter pub get
        script: |
          cd thermometer-ble
          flutter pub get

      # 2. Анализ кода
      - name: Flutter analyze
        script: |
          cd thermometer-ble
          flutter analyze --no-fatal-infos

      # 3. Сборка APK
      #    key.properties отсутствует → build.gradle.kts автоматически
      #    использует debug signingConfig (fallback прописан в gradle)
      - name: Build APK (test)
        script: |
          cd thermometer-ble
          flutter build apk \
            --release \
            --build-name=0.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER

    artifacts:
      - thermometer/build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - bmb20109@yandex.ru   # <- замени на свой email
        notify:
          success: true
          failure: true


  # ────────────────────────────────────────────────────────────
  #  iOS: неподписанный IPA
  #  Устанавливается через AltStore / Sideloadly (не App Store)
  # ────────────────────────────────────────────────────────────
  ios-test:
    name: iOS Test Build
    max_build_duration: 40

    environment:
      flutter: 3.41.2
      java: 17
      xcode: latest
      cocoapods: default
      # ios_signing отсутствует намеренно — сборка без подписи
      vars:
        BUNDLE_ID: ru.matveyb9.diy.thermometer

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      # 1. Зависимости Flutter
      - name: Flutter pub get
        script: |
          cd thermometer-ble
          flutter pub get

      # 2. CocoaPods
      - name: Pod install
        script: |
          cd thermometer-ble/ios
          pod install

      # 3. Анализ кода
      - name: Flutter analyze
        script: |
          cd thermometer-ble
          flutter analyze --no-fatal-infos

      # 4. Сборка неподписанного IPA
      #    --no-codesign: пропускает подписание (Apple аккаунт не нужен)
      - name: Build IPA (unsigned)
        script: |
          cd thermometer-ble
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=0.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER

          # flutter build ios --no-codesign не создаёт .ipa автоматически
          # упаковываем .app в .ipa вручную
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/Release-iphoneos/Runner.app \
                build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r thermometer-unsigned.ipa Payload/

    artifacts:
      - thermometer/build/ios/ipa/thermometer-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - bmb20109@yandex.ru   # <- замени на свой email
        notify:
          success: true
          failure: true
