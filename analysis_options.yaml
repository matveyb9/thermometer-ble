# ─────────────────────────────────────────────────────────────
#  analysis_options.yaml
#  Настройки статического анализатора Dart / Flutter
#
#  Базируется на flutter_lints 5.0 (рекомендованный набор Flutter-команды).
#  Дополнен правилами для чистого кода и безопасной работы с async/BLE.
# ─────────────────────────────────────────────────────────────

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    # Строгие проверки типов — ловит больше ошибок до запуска
    strict-casts:          true
    strict-inference:      true
    strict-raw-types:      true

  errors:
    # Treat как ошибки — не дадут собрать проект
    missing_return:                   error
    dead_code:                        error

    # Treat как предупреждения — видны, но не блокируют сборку
    todo:                             info
    deprecated_member_use:            warning
    deprecated_member_use_from_same_package: warning

  exclude:
    # Сгенерированный код — не анализируем
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "build/**"

linter:
  rules:
    # ── Стиль и читаемость ───────────────────────────────────
    always_declare_return_types:       true   # явный тип возвращаемого значения
    always_put_required_named_parameters_first: true
    prefer_single_quotes:              true   # одинарные кавычки везде
    prefer_const_constructors:         true   # const где возможно
    prefer_const_declarations:         true
    prefer_final_fields:               true   # final вместо var для полей
    prefer_final_locals:               true   # final для локальных переменных
    unnecessary_this:                  true   # убираем лишний this.
    avoid_redundant_argument_values:   true

    # ── Безопасность async ───────────────────────────────────
    # Важно для BLE: незакрытые стримы и забытые await — частая причина утечек
    unawaited_futures:                 true   # предупреждает о забытом await
    cancel_subscriptions:              true   # StreamSubscription.cancel() в dispose
    close_sinks:                       true   # StreamController.close() в dispose

    # ── Flutter-специфичные ──────────────────────────────────
    use_build_context_synchronously:   true   # не использовать context после await
    avoid_unnecessary_containers:      true   # лишние Container() засоряют дерево
    sized_box_for_whitespace:          true   # SizedBox вместо Container для отступов
    use_colored_box:                   true   # ColoredBox вместо Container(color:)
    prefer_const_constructors_in_immutables: true

    # ── Качество кода ────────────────────────────────────────
    avoid_print:                       true   # использовать debugPrint в Flutter
    avoid_empty_catch:                 true   # пустой catch скрывает ошибки
    avoid_catches_without_on_clauses:  true   # catch без типа — слишком широко
    only_throw_errors:                 true   # бросать Error/Exception, не строки
    prefer_is_empty:                   true   # .isEmpty вместо .length == 0
    prefer_is_not_empty:               true
    eol_at_end_of_file:                true   # перевод строки в конце файла
